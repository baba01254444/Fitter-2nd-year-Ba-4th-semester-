<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Test Series - R0HiiT_YadaV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MCQ Quiz Portal</h1>
            <p class="creator">Developed By: <strong>[[ R0HiiT_YadaV ]]</strong></p>
        </header>

        <div id="home-screen">
            <h3>Apna Subject Chunein:</h3>
            <div class="subject-grid" id="subject-list">
                </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <span id="subject-title" class="badge">Subject</span>
                <span id="progress" class="badge">1/30</span>
            </div>

            <div id="question-container">
                <div id="image-box"></div> 
                
                <p id="question-text">Sawal load ho raha hai...</p>
                
                <div id="options-container" class="options-grid">
                    </div>
            </div>

            <div class="controls">
                <button id="prev-btn" onclick="prevQuestion()">← Previous</button>
                <button id="home-btn-quiz" onclick="goHome()">🏠 Home</button>
                <button id="next-btn" onclick="nextQuestion()">Next →</button>
                <button id="submit-btn" class="hidden" onclick="showFeedback()">Submit Test ✅</button>
            </div>
        </div>

        <div id="feedback-screen" class="hidden">
            <div class="result-header">
                <h2>Aapka Result</h2>
                <div id="score-card"></div>
            </div>
            
            <div id="result-details">
                </div>

            <button onclick="goHome()" class="home-btn">Naya Test Shuru Karein</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
